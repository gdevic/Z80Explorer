; Working flag input latches (ALU reads OLD flag values from these for ADC/SBC/RLA/DAA).
; Both are dynamic CLK-gated sample nodes: pass-gate from UBUS sampled when gate=net 684
; goes HIGH, then the value is held by gate capacitance when 684 goes LOW.
; First transistor: sampler (gate=684 passes UBUS bit into storage node).
; Second transistor: output driver (its gate = the storage node, i.e. it fires when the
; sampled flag = 1).
; Experimentally confirmed: during ADC A,0 with SCF/OR A differing only in CF (working
; CF=1 vs 0), net 1809 shows the complement of CF at M1T4-M2T1 when ADC consumes the carry.
; Value stored active-low: 1809=0 means CF=1, 1809=1 means CF=0.
8205,4103 ; WORK_CF ; working CF input latch. t8205 gate=684 passes UBUS[0]=545 into storage net 1809. t4103 gate=1809 pulls net 3363 LOW when stored NOT-CF is HIGH (= CF was 0).
8414,4252 ; WORK_HF ; working HF input latch. t8414 gate=684 passes UBUS[4]=779 into storage net 1864. t4252 gate=1864 pulls net 3380 LOW when stored NOT-HF is HIGH (= HF was 0).

; ALU latches
; The Z80 has a 4-bit ALU that operates nibble-at-a-time. Each 8-bit operand is
; held in a dedicated latch during the compute. Low nibble = bits 0..3, high
; nibble = bits 4..7. First transistor in each pair is the clk-gated D-sampler
; (gate=clk=net 3); second transistor is the output driver (gate=storage net).
; Convention: drain of the sampler = the storage node (alua<i> or alub<i>).

; ALUA (op1 latch / A-input operand, 8 bits, nets 850,899,947,993,868,920,968,1007)
